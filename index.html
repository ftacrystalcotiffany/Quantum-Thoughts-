<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Thoughts</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap">
    <style>
        body { font-family: 'Roboto', sans-serif; margin: 0; padding: 0; }
        header { background: #282c34; color: white; padding: 10px 20px; text-align: center; }
        .compose { margin: 20px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        .archive { background: #f9f9f9; margin: 20px; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        .modal { display: none; position: fixed; z-index: 1; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgb(0,0,0); background-color:rgba(0,0,0,0.4); padding-top: 60px; }
        .modal-content { background-color: #fefefe; margin: 5% auto; padding: 20px; border: 1px solid #888; width: 80%; }
        .close { color: #aaa; float: right; font-size: 28px; font-weight: bold; }
        .close:hover, .close:focus { color: black; text-decoration: none; cursor: pointer; }
    </style>
</head>
<body>
<header>
    <h1>Welcome to Quantum Thoughts</h1>
</header>
<section class="compose">
    <h2>Compose Your Thoughts</h2>
    <textarea rows="5" cols="40" placeholder="Write your thoughts here..."></textarea>
    <button>Submit</button>
</section>
<section class="archive">
    <h2>Archived Thoughts</h2>
    <div id="archive-content">
        <!-- Archive items will be displayed here -->
    </div>
</section>
<div id="myModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <p>Some text in the Modal..</p>
    </div>
</div>
<script>
    var modal = document.getElementById('myModal');
    var btn = document.getElementById('myBtn');
    var span = document.getElementsByClassName('close')[0];

    btn.onclick = function() {
        modal.style.display = 'block';
    }

    span.onclick = function() {
        modal.style.display = 'none';
    }

    window.onclick = function(event) {
        if (event.target == modal) {
            modal.style.display = 'none';
        }
    }
</script>
</body>
</html>
